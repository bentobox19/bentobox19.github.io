---
layout: default
---
<article class="post">
  <p class="back"><a href="{{ '/' | relative_url }}">← Index</a></p>
  {% if page.title %}<h1 class="post-title">{{ page.title }}</h1>{% endif %}
  {% if page.date %}<p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>{% endif %}
  <div class="post-body">
    {{ content }}
  </div>
</article>
