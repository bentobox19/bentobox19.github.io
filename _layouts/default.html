<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.url %}<link rel="canonical" href="{{ page.url | absolute_url }}">{% endif %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Serif+4:ital,opt@0,8..60;1,8..60&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
<div class="wrap">
  {{ content }}
  <footer>Hosted on GitHub Pages</footer>
</div>
<script>
document.querySelectorAll('.post-body div.highlight').forEach(function(block){
  // skip untagged plaintext callouts — no copy button
  if(block.closest('.language-plaintext'))return;
  var btn=document.createElement('button');
  btn.className='copy-btn';btn.type='button';btn.textContent='copy';
  btn.addEventListener('click',function(){
    var pre=block.querySelector('pre');
    var text=pre?pre.innerText:block.innerText;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){
      btn.textContent='copied ✓';setTimeout(function(){btn.textContent='copy';},1200);
    });}
  });
  block.appendChild(btn);
});
</script>
</body>
</html>
