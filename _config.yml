title: Herman Junge
description: "@bentobox19"
url: "https://bentobox19.github.io"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Apply the post layout to everything under /posts/ without touching each file.
defaults:
  - scope:
      path: "posts"
    values:
      layout: post

exclude:
  - README.md
  - gp
  - Gemfile
  - Gemfile.lock
  - vendor
